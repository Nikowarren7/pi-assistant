<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PI" />
  <meta name="theme-color" content="#141210" />
  <title>PI ASSISTANT</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');

    :root {
      --bg:        #141210;
      --surface:   #1c1914;
      --panel:     #22201a;
      --border:    #3a3228;
      --accent:    #c4722a;
      --accent2:   #e08840;
      --glow:      #c4722a55;
      --glow2:     #c4722a22;
      --text:      #d4c4a8;
      --text-dim:  #7a6a58;
      --ai-msg:    #191610;
      --user-msg:  #1f1c16;
      --scratch:   #2a1a08;
      --red:       #8b3020;
      --green:     #5a9a48;
      --blue:      #4a7a9b;
      --blue2:     #5a9abb;
      --blue-glow: #4a7a9b55;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    /* Claude mode overrides accent to blue */
    body.claude-mode {
      --accent:  #4a7a9b;
      --accent2: #5a9abb;
      --glow:    #4a7a9b55;
      --glow2:   #4a7a9b22;
      --scratch: #081a2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: --accent .3s;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      padding-top: calc(10px + var(--safe-top));
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0; position: relative; z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .logo-mark {
      width: 32px; height: 32px; flex-shrink: 0;
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      background: var(--scratch);
      box-shadow: 0 0 10px var(--glow);
      transition: border-color .3s, box-shadow .3s, background .3s;
    }
    .logo-mark svg { width: 16px; height: 16px; fill: var(--accent2); transition: fill .3s; }

    .title-block h1 {
      font-size: 15px; font-weight: 700; letter-spacing: 3px;
      color: var(--accent2); text-transform: uppercase; transition: color .3s;
    }
    .title-block p { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--text-dim);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #444;
      transition: background .3s, box-shadow .3s; flex-shrink: 0;
    }
    .status-dot.online  { background: var(--green); box-shadow: 0 0 6px #5a9a4888; }
    .status-dot.busy    { background: var(--accent2); box-shadow: 0 0 6px var(--glow); animation: pulse 1s infinite; }
    .status-dot.offline { background: var(--red); }
    #statusText { display: none; }

    /* ── Layout ── */
    .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    .sidebar { display: none; }

    /* ── Mode banner ── */
    .mode-banner {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 6px 16px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .mode-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--accent2); display: flex; align-items: center; gap: 8px;
      transition: color .3s;
    }
    .mode-label::before {
      content: ''; width: 6px; height: 6px;
      background: var(--accent2); border-radius: 50%;
      box-shadow: 0 0 6px var(--glow);
      transition: background .3s, box-shadow .3s;
    }
    .mode-sublabel { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; font-family: 'Share Tech Mono', monospace; }

    /* ── Chat ── */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

    .messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 12px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
      -webkit-overflow-scrolling: touch;
    }

    .msg { display: flex; flex-direction: column; gap: 3px; width: 100%; }
    .msg-meta {
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-dim); font-family: 'Share Tech Mono', monospace; padding: 0 2px;
    }
    .msg.user .msg-meta { color: var(--accent); transition: color .3s; }
    .msg-bubble {
      padding: 10px 14px; border: 1px solid var(--border);
      line-height: 1.55; font-size: 15px;
      white-space: pre-wrap; word-break: break-word; border-radius: 2px;
    }
    .msg.user .msg-bubble { background: var(--user-msg); border-color: #302c24; }
    .msg.ai   .msg-bubble { background: var(--ai-msg); border-left: 2px solid var(--accent); transition: border-color .3s; }
    .msg.ai.streaming .msg-bubble::after { content: '▋'; color: var(--accent2); animation: blink .7s step-end infinite; }

    /* ── Input ── */
    .input-bar {
      border-top: 1px solid var(--border); background: var(--surface);
      padding: 10px 12px;
      padding-bottom: calc(10px + var(--safe-bot));
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    .input-wrap {
      flex: 1; border: 1px solid var(--border); background: var(--panel);
      display: flex; align-items: flex-end; transition: border-color .2s; border-radius: 2px;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    textarea {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Rajdhani', sans-serif;
      font-size: 16px; padding: 10px 12px; resize: none;
      min-height: 44px; max-height: 120px; line-height: 1.4;
    }
    textarea::placeholder { color: var(--text-dim); }
    .send-btn {
      background: var(--accent); border: none; color: #fff;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      padding: 0 18px; cursor: pointer; height: 44px; flex-shrink: 0;
      transition: background .2s, box-shadow .2s; border-radius: 2px; min-width: 64px;
    }
    .send-btn:active { background: var(--accent2); box-shadow: 0 0 16px var(--glow); }
    .send-btn:disabled { opacity: .4; }

    /* ── Bottom toolbar ── */
    .toolbar {
      display: flex; align-items: stretch; justify-content: space-around;
      border-top: 1px solid var(--border); background: var(--surface);
      padding: 6px 12px; padding-bottom: calc(6px + var(--safe-bot));
      flex-shrink: 0; gap: 6px;
    }
    .tool-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'Rajdhani', sans-serif;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      padding: 8px 10px; cursor: pointer; flex: 1; min-height: 50px;
      transition: border-color .2s, color .2s, box-shadow .2s, background .2s;
      border-radius: 2px;
    }
    .tool-btn svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }
    .tool-btn:active { border-color: var(--accent); color: var(--accent2); }
    .tool-btn.active  { border-color: var(--accent); color: var(--accent2); box-shadow: 0 0 8px var(--glow); background: var(--glow2); }

    /* mode toggle special */
    .mode-toggle-btn { position: relative; }
    .mode-toggle-btn .mode-pip {
      position: absolute; top: 6px; right: 6px;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent2); box-shadow: 0 0 4px var(--glow);
      transition: background .3s;
    }

    /* ── Config panel — slides up ── */
    .cfg-overlay {
      position: fixed; inset: 0; background: #00000077;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .cfg-overlay.open { opacity: 1; pointer-events: all; }

    .cfg-panel {
      position: fixed; bottom: -100%; left: 0; right: 0; max-height: 88dvh;
      background: var(--surface); border-top: 1px solid var(--accent);
      box-shadow: 0 -8px 40px #00000099;
      z-index: 101; display: flex; flex-direction: column;
      transition: bottom .35s cubic-bezier(.4,0,.2,1);
      border-radius: 12px 12px 0 0; overflow: hidden;
    }
    .cfg-panel.open { bottom: 0; }

    .cfg-drag { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }

    .cfg-header {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #221a10 0%, var(--surface) 100%);
      flex-shrink: 0; position: relative;
    }
    .cfg-header::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent2), transparent);
      transition: background .3s;
    }
    .cfg-title { font-size: 13px; font-weight: 700; letter-spacing: 4px; color: var(--accent2); text-transform: uppercase; transition: color .3s; }
    .cfg-subtitle { font-size: 9px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; margin-top: 2px; }
    .cfg-close {
      position: absolute; top: 12px; right: 16px;
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); font-size: 16px; width: 30px; height: 30px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    .cfg-body {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 24px;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(20px + var(--safe-bot));
    }

    .cfg-section-title {
      font-size: 10px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase;
      margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; transition: color .3s;
    }
    .cfg-section-title::before {
      content: ''; width: 3px; height: 12px; background: var(--accent2);
      box-shadow: 0 0 6px var(--glow); flex-shrink: 0; transition: background .3s, box-shadow .3s;
    }

    .cfg-row { display: flex; flex-direction: column; gap: 8px; }
    .cfg-row-label { display: flex; justify-content: space-between; align-items: center; }
    .cfg-row-label span:first-child { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--text); }
    .cfg-val { font-family: 'Share Tech Mono', monospace; font-size: 14px; color: var(--accent2); min-width: 40px; text-align: right; transition: color .3s; }

    input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: var(--border); outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px;
      background: var(--accent2); border-radius: 0;
      box-shadow: 0 0 8px var(--glow);
      clip-path: polygon(50% 0%,100% 50%,50% 100%,0% 50%);
      transition: background .3s;
    }
    input[type=range]::-moz-range-thumb { width: 22px; height: 22px; background: var(--accent2); border: none; border-radius: 0; }
    .range-hints { display: flex; justify-content: space-between; margin-top: 2px; }
    .range-hints span { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }

    .voice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .voice-btn {
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
      font-size: 10px; padding: 12px 10px; cursor: pointer;
      text-align: left; line-height: 1.4; position: relative; overflow: hidden;
      transition: border-color .2s, color .2s, background .2s; min-height: 52px;
    }
    .voice-btn::before { content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: transparent; transition: background .2s; }
    .voice-btn.selected { border-color: var(--accent2); color: var(--accent2); background: var(--scratch); box-shadow: inset 0 0 12px var(--glow2); }
    .voice-btn.selected::before { background: var(--accent2); box-shadow: 0 0 6px var(--glow); }
    .voice-tag { font-size: 8px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; display: block; margin-top: 3px; }
    .voice-btn.selected .voice-tag { color: var(--accent); }

    .cfg-apply {
      background: var(--accent); border: none; color: #fff;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 14px; letter-spacing: 4px; text-transform: uppercase;
      padding: 16px; cursor: pointer; width: 100%;
      transition: background .2s, box-shadow .2s; min-height: 52px;
    }
    .cfg-apply:active { background: var(--accent2); box-shadow: 0 0 20px var(--glow); }

    .cfg-feedback {
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      color: var(--green); letter-spacing: 2px; text-align: center; min-height: 18px; transition: opacity .3s;
    }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    @keyframes blink { 50% { opacity: 0; } }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Tab switcher ── */
    .tab-bar {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .tab-btn {
      flex: 1; padding: 10px; background: none; border: none;
      color: var(--text-dim); font-family: 'Rajdhani', sans-serif;
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    /* ── Views ── */
    .view { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
    .view.active { display: flex; }

    /* ── Terminal ── */
    .term-container { flex: 1; overflow: hidden; padding: 8px; background: var(--bg); }
    .xterm { height: 100%; }

    .quick-cmds {
      border-top: 1px solid var(--border); background: var(--surface);
      padding: 8px 10px; padding-bottom: calc(8px + var(--safe-bot));
      display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0;
    }
    .quick-cmd {
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
      font-size: 10px; padding: 6px 10px; cursor: pointer;
      transition: border-color .2s, color .2s; border-radius: 2px;
      letter-spacing: 0.5px; white-space: nowrap;
    }
    .quick-cmd:active { border-color: var(--accent); color: var(--accent2); }

    /* ════════════════ DESKTOP ════════════════ */
    @media (min-width: 700px) {
      #statusText { display: inline; }
      .toolbar    { display: none; }
      header      { padding: 10px 20px; }

      .hdr-btn {
        background: none; border: 1px solid var(--border);
        color: var(--text-dim); font-family: 'Rajdhani', sans-serif;
        font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
        padding: 5px 14px; cursor: pointer;
        transition: border-color .2s, color .2s, box-shadow .2s;
      }
      .hdr-btn:hover  { border-color: var(--accent); color: var(--accent2); }
      .hdr-btn.active { border-color: var(--accent); color: var(--accent2); box-shadow: 0 0 8px var(--glow); }

      .sidebar {
        display: flex; flex-direction: column; width: 200px; flex-shrink: 0;
        border-right: 1px solid var(--border); background: var(--surface); padding: 16px 0; gap: 4px;
      }
      .sidebar-label { font-size: 10px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; padding: 0 16px 8px; }
      .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 16px; font-size: 12px; }
      .stat-row span:first-child { color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; font-size: 11px; }
      .stat-row span:last-child  { font-family: 'Share Tech Mono', monospace; color: var(--accent2); font-size: 12px; }
      .divider { border: none; border-top: 1px solid var(--border); margin: 10px 16px; }
      .queue-list { flex: 1; overflow-y: auto; padding: 0 8px; }
      .queue-item {
        padding: 8px; font-size: 11px; font-family: 'Share Tech Mono', monospace;
        color: var(--text-dim); border-left: 2px solid transparent;
        margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .queue-item.done       { border-color: var(--green); color: var(--text); }
      .queue-item.processing { border-color: var(--accent2); color: var(--accent2); animation: pulse 1s infinite; }
      .queue-item.error      { border-color: var(--red); }

      .messages  { padding: 20px; gap: 16px; }
      .input-bar { padding: 14px 20px; }

      .cfg-panel {
        top: 0; bottom: auto; left: auto; right: -480px;
        width: 440px; max-height: 100%;
        border-top: none; border-left: 1px solid var(--accent);
        box-shadow: -8px 0 40px #00000099;
        border-radius: 0; transition: right .35s cubic-bezier(.4,0,.2,1);
      }
      .cfg-panel.open { right: 0; }
      .cfg-drag { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-left">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L20 8.5v7L12 19.82 4 15.5v-7L12 4.18z"/></svg>
    </div>
    <div class="title-block">
      <h1>PI ASSISTANT</h1>
      <p>Local Intelligence System</p>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">CHECKING</span>
    </div>
    <button class="hdr-btn" id="ttsToggleDesk" onclick="toggleTTS()">TTS OFF</button>
    <button class="hdr-btn" id="modeToggleDesk" onclick="toggleMode()">LOCAL</button>
    <button class="hdr-btn" onclick="openConfig()">CONFIG</button>
    <button class="hdr-btn" onclick="clearSession()">CLEAR</button>
  </div>
</header>

<!-- ── Tab bar ── -->
<div class="tab-bar">
  <button class="tab-btn active" id="tabChat" onclick="switchTab('chat')">CHAT</button>
  <button class="tab-btn" id="tabTerm" onclick="switchTab('term')">TERMINAL</button>
</div>

<!-- ── Chat view ── -->
<div class="view active" id="viewChat">
<div class="mode-banner">
  <div class="mode-label" id="modeBannerLabel">LOCAL · QWEN 2.5 14B</div>
  <div class="mode-sublabel" id="modeBannerSub">RUNNING ON LAPTOP VIA ETHERNET</div>
</div>

<!-- ── Main ── -->
<div class="main">
  <div class="sidebar">
    <div class="sidebar-label">System</div>
    <div class="stat-row"><span>Mode</span><span id="statMode">LOCAL</span></div>
    <div class="stat-row"><span>Model</span><span id="statModel">—</span></div>
    <div class="stat-row"><span>Session</span><span id="statSession">—</span></div>
    <div class="stat-row"><span>Queued</span><span id="statQueued">0</span></div>
    <hr class="divider" />
    <div class="sidebar-label">Queue</div>
    <div class="queue-list" id="queueList"></div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="Transmit message..."
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">SEND</button>
    </div>
  </div>
</div>
</div><!-- end viewChat -->

<!-- ── Terminal view ── -->
<div class="view" id="viewTerm">
  <div class="term-container" id="termContainer"></div>
  <div class="quick-cmds">
    <button class="quick-cmd" onclick="sendCmd('claude\n')">claude</button>
    <button class="quick-cmd" onclick="sendCmd('cd ~/assistant && git status\n')">git status</button>
    <button class="quick-cmd" onclick="sendCmd('cd ~/assistant && git pull\n')">git pull</button>
    <button class="quick-cmd" onclick="sendCmd('pkill -f uvicorn; cd ~/assistant && python3 -m uvicorn server:app --host 0.0.0.0 --port 8000 &\n')">restart server</button>
    <button class="quick-cmd" onclick="sendCmd('htop\n')">htop</button>
    <button class="quick-cmd" onclick="sendCmd('clear\n')">clear</button>
  </div>
</div>

<!-- ── Mobile toolbar ── -->
<div class="toolbar">
  <button class="tool-btn" id="ttsToggleMob" onclick="toggleTTS()">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    <span>TTS OFF</span>
  </button>
  <button class="tool-btn mode-toggle-btn" id="modeToggleMob" onclick="toggleMode()">
    <div class="mode-pip"></div>
    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 11.5v-3H9v3L5.5 12 9 8.5v3h6v-3l3.5 3.5-3.5 3.5z"/></svg>
    <span>LOCAL</span>
  </button>
  <button class="tool-btn" onclick="openConfig()">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    <span>CONFIG</span>
  </button>
  <button class="tool-btn" onclick="clearSession()">
    <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
    <span>CLEAR</span>
  </button>
</div>

<!-- ── Config panel ── -->
<div class="cfg-overlay" id="cfgOverlay" onclick="closeConfig()"></div>
<div class="cfg-panel" id="cfgPanel">
  <div class="cfg-drag"></div>
  <div class="cfg-header">
    <div class="cfg-title">System Config</div>
    <div class="cfg-subtitle">Voice &amp; Transmission Parameters</div>
    <button class="cfg-close" onclick="closeConfig()">✕</button>
  </div>
  <div class="cfg-body">
    <div>
      <div class="cfg-section-title">Voice Module</div>
      <div class="voice-grid" id="voiceGrid">
        <div class="voice-btn" style="opacity:.4">Loading...</div>
      </div>
    </div>
    <div>
      <div class="cfg-section-title">Speech Rate</div>
      <div class="cfg-row">
        <div class="cfg-row-label">
          <span>Length Scale</span>
          <span class="cfg-val" id="lsVal">1.25</span>
        </div>
        <input type="range" id="lsSlider" min="0.6" max="2.0" step="0.05" value="1.25"
          oninput="document.getElementById('lsVal').textContent = parseFloat(this.value).toFixed(2)" />
        <div class="range-hints"><span>Fast</span><span>Slow</span></div>
      </div>
    </div>
    <div>
      <button class="cfg-apply" onclick="applyConfig()">APPLY CONFIGURATION</button>
      <div class="cfg-feedback" id="cfgFeedback"></div>
    </div>
  </div>
</div>

<script>
  const SESSION_ID = 'web-' + Math.random().toString(36).slice(2, 7);
  let isStreaming   = false;
  let ttsEnabled    = false;
  let claudeMode    = false;
  let currentAudio  = null;
  let selectedVoice = 'en_US-lessac-medium';
  const queuedJobs  = {};

  document.getElementById('statSession').textContent = SESSION_ID.slice(4).toUpperCase();

  // ── Mode toggle ─────────────────────────────────────────────────────────────
  function toggleMode() {
    claudeMode = !claudeMode;
    document.body.classList.toggle('claude-mode', claudeMode);

    const label = claudeMode ? 'CLAUDE' : 'LOCAL';
    document.getElementById('modeToggleDesk').textContent = label;
    document.getElementById('modeToggleMob').querySelector('span').textContent = label;
    document.getElementById('modeToggleMob').classList.toggle('active', claudeMode);
    document.getElementById('modeToggleDesk').classList.toggle('active', claudeMode);
    document.getElementById('statMode').textContent = label;

    if (claudeMode) {
      document.getElementById('modeBannerLabel').textContent = 'CLAUDE · SONNET 4.6';
      document.getElementById('modeBannerSub').textContent   = 'RUNNING VIA PI · FULL TOOL ACCESS';
      document.getElementById('statModel').textContent = 'CLAUDE';
    } else {
      document.getElementById('modeBannerLabel').textContent = 'LOCAL · QWEN 2.5 14B';
      document.getElementById('modeBannerSub').textContent   = 'RUNNING ON LAPTOP VIA ETHERNET';
      document.getElementById('statModel').textContent = 'QWEN';
    }

    // Clear chat on mode switch
    stopTTS();
    document.getElementById('messages').innerHTML = '';
    fetch(`/sessions/${SESSION_ID}/clear`);
  }

  // ── TTS ─────────────────────────────────────────────────────────────────────
  function toggleTTS() {
    ttsEnabled = !ttsEnabled;
    const label = ttsEnabled ? 'TTS ON' : 'TTS OFF';
    document.getElementById('ttsToggleDesk').textContent = label;
    document.getElementById('ttsToggleMob').querySelector('span').textContent = label;
    document.getElementById('ttsToggleDesk').classList.toggle('active', ttsEnabled);
    document.getElementById('ttsToggleMob').classList.toggle('active', ttsEnabled);
    if (!ttsEnabled) stopTTS();
  }

  const ttsQueue = [];
  let ttsPlaying = false;

  async function enqueueTTS(text) {
    if (!ttsEnabled || !text.trim()) return;
    ttsQueue.push(text);
    if (!ttsPlaying) playNextChunk();
  }

  async function playNextChunk() {
    if (!ttsQueue.length) { ttsPlaying = false; return; }
    ttsPlaying = true;
    const text = ttsQueue.shift();
    try {
      const r    = await fetch('/tts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
      const blob = await r.blob();
      const url  = URL.createObjectURL(blob);
      currentAudio = new Audio(url);
      currentAudio.play();
      currentAudio.onended = () => { URL.revokeObjectURL(url); playNextChunk(); };
    } catch { playNextChunk(); }
  }

  function stopTTS() {
    ttsQueue.length = 0;
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    ttsPlaying = false;
  }

  // ── Health ──────────────────────────────────────────────────────────────────
  async function checkHealth() {
    try {
      const d = await (await fetch('/health')).json();
      document.getElementById('statusDot').className    = 'status-dot online';
      document.getElementById('statusText').textContent  = 'ONLINE';
      if (!claudeMode) document.getElementById('statModel').textContent = d.model.split('-')[0].toUpperCase();
      document.getElementById('statQueued').textContent  = d.queued_jobs;
    } catch {
      document.getElementById('statusDot').className    = 'status-dot offline';
      document.getElementById('statusText').textContent  = 'OFFLINE';
    }
  }
  setInterval(checkHealth, 5000);
  checkHealth();

  // ── Messages ────────────────────────────────────────────────────────────────
  function addMessage(role, content, streaming = false) {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = `msg ${role}${streaming ? ' streaming' : ''}`;
    const aiLabel = claudeMode ? 'CLAUDE' : 'QWEN';
    div.innerHTML = `<div class="msg-meta">${role === 'user' ? 'YOU' : aiLabel} · ${new Date().toLocaleTimeString()}</div><div class="msg-bubble"></div>`;
    div.querySelector('.msg-bubble').textContent = content;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function updateMessage(div, content, done = false) {
    div.querySelector('.msg-bubble').textContent = content;
    if (done) div.classList.remove('streaming');
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  // ── Send ────────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('input');
    const msg   = input.value.trim();
    if (!msg || isStreaming) return;

    isStreaming = true;
    input.value = '';
    autoResize(input);
    input.blur();
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('statusDot').className    = 'status-dot busy';
    document.getElementById('statusText').textContent  = 'PROCESSING';

    addMessage('user', msg);
    const aiDiv = addMessage('ai', '', true);

    const endpoint = claudeMode ? '/claude' : '/chat';

    try {
      const r = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, session_id: SESSION_ID + (claudeMode ? '-claude' : ''), stream: true }),
      });

      const reader  = r.body.getReader();
      const decoder = new TextDecoder();
      let full    = '';
      let wordBuf = '';
      stopTTS();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        full += chunk;
        updateMessage(aiDiv, full);
        for (const char of chunk) {
          wordBuf += char;
          if (/[.!?;]/.test(char) && wordBuf.trim().length > 2) {
            enqueueTTS(wordBuf.trim());
            wordBuf = '';
          }
        }
      }
      if (wordBuf.trim()) enqueueTTS(wordBuf.trim());
      updateMessage(aiDiv, full, true);
    } catch(e) {
      updateMessage(aiDiv, 'Connection error: ' + e.message, true);
    }

    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('statusDot').className    = 'status-dot online';
    document.getElementById('statusText').textContent  = 'ONLINE';
  }

  // ── Queue ───────────────────────────────────────────────────────────────────
  async function pollJob(jobId) {
    const iv = setInterval(async () => {
      const d = await (await fetch(`/queue/${jobId}`)).json();
      queuedJobs[jobId] = d;
      renderQueue();
      document.getElementById('statQueued').textContent =
        Object.values(queuedJobs).filter(j => ['queued','processing'].includes(j.status)).length;
      if (d.status === 'done' || d.status === 'error') clearInterval(iv);
    }, 1000);
  }

  function renderQueue() {
    const list = document.getElementById('queueList');
    list.innerHTML = '';
    Object.entries(queuedJobs).reverse().forEach(([id, job]) => {
      const div = document.createElement('div');
      div.className = `queue-item ${job.status}`;
      div.textContent = `[${id}] ${(job.message||'').slice(0,22)}`;
      div.title = job.result || job.message;
      list.appendChild(div);
    });
  }

  // ── Clear ───────────────────────────────────────────────────────────────────
  async function clearSession() {
    stopTTS();
    await fetch(`/sessions/${SESSION_ID}/clear`);
    await fetch(`/sessions/${SESSION_ID}-claude/clear`);
    document.getElementById('messages').innerHTML = '';
  }

  // ── Input ───────────────────────────────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── Config ──────────────────────────────────────────────────────────────────
  async function openConfig() {
    document.getElementById('cfgOverlay').classList.add('open');
    document.getElementById('cfgPanel').classList.add('open');
    try {
      const [cfgR, voiceR] = await Promise.all([fetch('/tts/config'), fetch('/tts/voices')]);
      const cfg    = await cfgR.json();
      const voices = await voiceR.json();
      document.getElementById('lsSlider').value = cfg.length_scale;
      document.getElementById('lsVal').textContent = parseFloat(cfg.length_scale).toFixed(2);
      selectedVoice = cfg.voice;
      renderVoiceGrid(voices.voices, voices.current);
    } catch(e) { console.warn(e); }
  }

  function closeConfig() {
    document.getElementById('cfgOverlay').classList.remove('open');
    document.getElementById('cfgPanel').classList.remove('open');
  }

  function renderVoiceGrid(voices, current) {
    selectedVoice = current;
    const grid = document.getElementById('voiceGrid');
    grid.innerHTML = '';
    voices.forEach(v => {
      const parts   = v.split('-');
      const speaker = parts.slice(1, -1).join(' ');
      const lang    = parts[0];
      const quality = parts[parts.length - 1];
      const btn = document.createElement('button');
      btn.className = 'voice-btn' + (v === current ? ' selected' : '');
      btn.innerHTML = `${speaker.toUpperCase()}<span class="voice-tag">${lang} · ${quality}</span>`;
      btn.onclick = () => {
        document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedVoice = v;
      };
      grid.appendChild(btn);
    });
  }

  async function applyConfig() {
    try {
      await fetch('/tts/config', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ voice: selectedVoice, length_scale: parseFloat(document.getElementById('lsSlider').value) }),
      });
      const fb = document.getElementById('cfgFeedback');
      fb.textContent = '// CONFIG APPLIED';
      fb.style.opacity = '1';
      setTimeout(() => { fb.style.opacity = '0'; }, 2500);
    } catch(e) {
      document.getElementById('cfgFeedback').textContent = 'ERROR: ' + e.message;
    }
  }

  // ── Tab switching ─────────────────────────────────────────────────────────
  let termInitialized = false;
  let term, fitAddon, termSocket;

  function switchTab(tab) {
    document.getElementById('viewChat').classList.toggle('active', tab === 'chat');
    document.getElementById('viewTerm').classList.toggle('active', tab === 'term');
    document.getElementById('tabChat').classList.toggle('active', tab === 'chat');
    document.getElementById('tabTerm').classList.toggle('active', tab === 'term');
    document.querySelector('.toolbar').style.display = tab === 'term' ? 'none' : '';
    if (tab === 'term' && !termInitialized) initTerminal();
    if (tab === 'term' && fitAddon) setTimeout(() => fitAddon.fit(), 100);
  }

  function initTerminal() {
    termInitialized = true;
    term = new Terminal({
      fontFamily: '"Share Tech Mono", monospace',
      fontSize: 13,
      lineHeight: 1.3,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 2000,
      theme: {
        background:         '#141210',
        foreground:         '#d4c4a8',
        cursor:             '#e08840',
        cursorAccent:       '#141210',
        selectionBackground:'#c4722a44',
        black:              '#1c1914',
        red:                '#8b3020',
        green:              '#5a9a48',
        yellow:             '#c4722a',
        blue:               '#4a7a9b',
        magenta:            '#7a5a8b',
        cyan:               '#4a8a7a',
        white:              '#d4c4a8',
        brightBlack:        '#5a5040',
        brightRed:          '#c04030',
        brightGreen:        '#7ab858',
        brightYellow:       '#e08840',
        brightBlue:         '#5a9abb',
        brightMagenta:      '#9a7aab',
        brightCyan:         '#5aaa9a',
        brightWhite:        '#f0e8d8',
      }
    });

    fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('termContainer'));
    fitAddon.fit();

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    termSocket = new WebSocket(`${proto}://${location.host}/ws/terminal`);
    termSocket.binaryType = 'arraybuffer';

    termSocket.onopen = () => {
      termSocket.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
    };
    termSocket.onmessage = (e) => {
      if (e.data instanceof ArrayBuffer) term.write(new Uint8Array(e.data));
      else term.write(e.data);
    };
    termSocket.onclose = () => term.write('\r\n\x1b[33m[connection closed]\x1b[0m\r\n');

    term.onData(data => {
      if (termSocket.readyState === WebSocket.OPEN)
        termSocket.send(new TextEncoder().encode(data));
    });
    term.onResize(({ cols, rows }) => {
      if (termSocket.readyState === WebSocket.OPEN)
        termSocket.send(JSON.stringify({ type: 'resize', cols, rows }));
    });

    window.addEventListener('resize', () => { if (fitAddon) fitAddon.fit(); });
  }

  function sendCmd(cmd) {
    if (!term || !termSocket || termSocket.readyState !== WebSocket.OPEN) return;
    termSocket.send(new TextEncoder().encode(cmd));
    term.focus();
  }
</script>
</body>
</html>
