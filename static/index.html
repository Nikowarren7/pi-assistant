<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PI" />
  <meta name="theme-color" content="#020812" />
  <title>PI ASSISTANT</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');

    :root {
      --bg:        #020812;
      --surface:   #040f1e;
      --panel:     #061525;
      --border:    #0d2640;
      --accent:    #0088ff;
      --accent2:   #40b4ff;
      --glow:      #0088ff66;
      --glow2:     #0088ff22;
      --text:      #eef2f8;
      --text-dim:  #3a6080;
      --ai-msg:    #040e1c;
      --user-msg:  #061220;
      --glass-bg:  rgba(6,20,50,0.6);
      --glass-border: rgba(0,136,255,0.2);
      --red:       #ff4040;
      --green:     #40e080;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    body.claude-mode {
      --accent:  #8040ff;
      --accent2: #b080ff;
      --glow:    #8040ff66;
      --glow2:   #8040ff22;
      --glass-bg: rgba(16,8,40,0.6);
      --glass-border: rgba(128,64,255,0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      padding-top: calc(10px + var(--safe-top));
      border-bottom: 1px solid var(--border);
      background: rgba(4,15,30,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0; position: relative; z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .logo-mark {
      width: 32px; height: 32px; flex-shrink: 0;
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      background: var(--glow2);
      box-shadow: 0 0 14px var(--glow);
      transition: border-color .3s, box-shadow .3s;
    }
    .logo-mark svg { width: 16px; height: 16px; fill: var(--accent2); transition: fill .3s; }

    .title-block h1 { font-size: 15px; font-weight: 700; letter-spacing: 3px; color: var(--accent2); text-transform: uppercase; transition: color .3s; }
    .title-block p  { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .status-pill { display: flex; align-items: center; gap: 6px; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); }
    .status-dot  { width: 7px; height: 7px; border-radius: 50%; background: #333; transition: background .3s, box-shadow .3s; flex-shrink: 0; }
    .status-dot.online  { background: var(--green); box-shadow: 0 0 6px #40e08088; }
    .status-dot.busy    { background: var(--accent2); box-shadow: 0 0 6px var(--glow); animation: pulse 1s infinite; }
    .status-dot.offline { background: var(--red); }
    #statusText { display: none; }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex; border-bottom: 1px solid var(--border);
      background: rgba(4,15,30,0.9); flex-shrink: 0;
    }
    .tab-btn {
      flex: 1; padding: 10px 4px; background: none; border: none;
      color: var(--text-dim); font-family: 'Rajdhani', sans-serif;
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    /* ── Views ── */
    .view { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
    .view.active { display: flex; }

    .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    .sidebar { display: none; }

    /* ── Mode banner ── */
    .mode-banner {
      background: rgba(6,20,50,0.7); border-bottom: 1px solid var(--border);
      padding: 5px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .mode-label {
      font-family: 'Share Tech Mono', monospace; font-size: 10px;
      letter-spacing: 3px; text-transform: uppercase; color: var(--accent2);
      display: flex; align-items: center; gap: 8px; transition: color .3s;
    }
    .mode-label::before { content: ''; width: 5px; height: 5px; background: var(--accent2); border-radius: 50%; box-shadow: 0 0 6px var(--glow); transition: background .3s; }
    .mode-sublabel { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; font-family: 'Share Tech Mono', monospace; }

    /* ── Chat ── */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; position: relative; }

    .messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 12px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
      -webkit-overflow-scrolling: touch;
    }

    .msg { display: flex; flex-direction: column; gap: 3px; width: 100%; }
    .msg-meta { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); font-family: 'Share Tech Mono', monospace; padding: 0 2px; }
    .msg.user .msg-meta { color: var(--accent2); transition: color .3s; }
    .msg-bubble {
      padding: 10px 14px; border: 1px solid var(--border);
      line-height: 1.55; font-size: 15px; white-space: pre-wrap; word-break: break-word; border-radius: 4px;
    }
    .msg.user .msg-bubble { background: var(--user-msg); border-color: #0d2240; }
    .msg.ai   .msg-bubble { background: var(--ai-msg); border-left: 2px solid var(--accent); transition: border-color .3s; }
    .msg.ai.streaming .msg-bubble::after { content: ''; }

    /* ── BD-1 ── */
    .bd1-container {
      position: absolute; bottom: 80px; left: 12px;
      display: flex; align-items: flex-end; gap: 8px;
      z-index: 20; pointer-events: none;
      opacity: 0; transform: translateY(8px);
      transition: opacity .3s ease, transform .3s ease;
    }
    .bd1-container.visible { opacity: 1; transform: translateY(0); }

    @keyframes bd1-appear { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

    .bd1-svg { width: 56px; height: 72px; flex-shrink: 0; }

    .bd1-body-shell { fill: #1a3a5c; stroke: var(--accent); stroke-width: 1.5; }
    .bd1-head-shell  { fill: #0d2640; stroke: var(--accent2); stroke-width: 1.5; }
    .bd1-visor       { fill: var(--accent2); opacity: 0.9; }
    .bd1-eye-glow    { fill: #ffffff; opacity: 0.7; }
    .bd1-antenna     { stroke: var(--accent2); stroke-width: 1.5; fill: none; }
    .bd1-antenna-tip { fill: var(--accent2); filter: drop-shadow(0 0 3px var(--accent2)); }
    .bd1-leg         { fill: #1a3a5c; stroke: var(--accent); stroke-width: 1; }
    .bd1-detail      { fill: none; stroke: var(--accent); stroke-width: 0.8; opacity: 0.5; }

    .bd1-head-group {
      transform-origin: 28px 32px;
      animation: bd1-talk 1.4s ease-in-out infinite;
    }
    .bd1-container.visible .bd1-antenna-tip { animation: bd1-ping .8s ease-in-out infinite; }

    @keyframes bd1-talk {
      0%   { transform: rotate(0deg); }
      12%  { transform: rotate(-14deg); }
      28%  { transform: rotate(10deg); }
      44%  { transform: rotate(-18deg); }
      58%  { transform: rotate(12deg); }
      72%  { transform: rotate(-8deg); }
      86%  { transform: rotate(6deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes bd1-ping {
      0%,100% { opacity:1; r: 3; }
      50%     { opacity:0.3; r: 5; }
    }

    /* speech bubble */
    .bd1-bubble {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 12px 12px 12px 4px;
      padding: 10px 14px;
      display: flex; flex-direction: column; gap: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      max-width: 240px; min-width: 70px;
    }
    .bd1-bubble-dots { display: flex; align-items: center; gap: 4px; }
    .bd1-bubble-text {
      display: none; font-size: 12px; line-height: 1.45;
      color: var(--text); max-height: 150px; overflow-y: auto;
      scrollbar-width: none; word-break: break-word;
    }
    .bd1-bubble-text::-webkit-scrollbar { display: none; }
    .bd1-container.talking .bd1-bubble-dots { display: none; }
    .bd1-container.talking .bd1-bubble-text { display: block; }

    .bd1-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent2);
      animation: bd1-dot-bounce .9s ease-in-out infinite;
    }
    .bd1-dot:nth-child(2) { animation-delay: .15s; }
    .bd1-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bd1-dot-bounce { 0%,80%,100% { transform:scale(0.7); opacity:.4; } 40% { transform:scale(1.2); opacity:1; } }

    /* corner BD-1 decorations */
    .bd1-corner {
      position: absolute; bottom: 10px; right: 10px;
      width: 36px; height: 46px; opacity: 0.3;
      pointer-events: none; z-index: 5;
      transition: opacity .3s;
    }
    .bd1-corner.active { opacity: 0.8; }
    .bd1-corner .bd1-head-group { animation: none; }
    .bd1-corner.excited .bd1-head-group { animation: bd1-talk .6s ease-in-out 3; }

    /* ── Input ── */
    .input-bar {
      border-top: 1px solid var(--border); background: rgba(4,15,30,0.9);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: 10px 12px; padding-bottom: calc(10px + var(--safe-bot));
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    .input-wrap { flex: 1; border: 1px solid var(--border); background: var(--panel); display: flex; align-items: flex-end; transition: border-color .2s; border-radius: 4px; }
    .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 12px var(--glow2); }
    textarea {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Rajdhani', sans-serif;
      font-size: 16px; padding: 10px 12px; resize: none;
      min-height: 44px; max-height: 120px; line-height: 1.4;
    }
    textarea::placeholder { color: var(--text-dim); }
    .send-btn {
      background: var(--accent); border: none; color: #fff;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      padding: 0 18px; cursor: pointer; height: 44px; flex-shrink: 0;
      transition: background .2s, box-shadow .2s; border-radius: 4px; min-width: 64px;
      box-shadow: 0 0 16px var(--glow2);
    }
    .send-btn:active { background: var(--accent2); box-shadow: 0 0 24px var(--glow); }
    .send-btn:disabled { opacity: .4; box-shadow: none; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: stretch; justify-content: space-around;
      border-top: 1px solid var(--border);
      background: rgba(4,15,30,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 6px 12px; padding-bottom: calc(6px + var(--safe-bot));
      flex-shrink: 0; gap: 6px;
    }
    .tool-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      color: var(--text-dim); font-family: 'Rajdhani', sans-serif;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      padding: 8px 10px; cursor: pointer; flex: 1; min-height: 50px;
      transition: border-color .2s, color .2s, box-shadow .2s, background .2s;
      border-radius: 10px;
    }
    .tool-btn svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }
    .tool-btn:active { border-color: var(--accent); color: var(--accent2); box-shadow: 0 0 12px var(--glow); }
    .tool-btn.active  { border-color: var(--accent); color: var(--accent2); box-shadow: 0 0 12px var(--glow); background: var(--glow2); }

    .mode-toggle-btn { position: relative; }
    .mode-pip { position: absolute; top: 6px; right: 6px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); box-shadow: 0 0 4px var(--glow); }

    /* ════════════════ TERMINAL TAB ════════════════ */
    .term-container { flex: 1; overflow: hidden; padding: 8px; background: var(--bg); position: relative; }
    .xterm { height: 100%; }
    .quick-cmds {
      border-top: 1px solid var(--border); background: rgba(4,15,30,0.9);
      padding: 8px 10px; padding-bottom: calc(8px + var(--safe-bot));
      display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0;
    }
    .quick-cmd {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
      font-size: 10px; padding: 6px 12px; cursor: pointer;
      transition: border-color .2s, color .2s, box-shadow .2s; border-radius: 8px;
      letter-spacing: 0.5px; white-space: nowrap;
    }
    .quick-cmd:active { border-color: var(--accent); color: var(--accent2); box-shadow: 0 0 10px var(--glow); }

    /* ════════════════ CONTROL CENTER ════════════════ */
    .controls-view {
      flex: 1; overflow-y: auto; padding: 14px 12px;
      padding-bottom: calc(14px + var(--safe-bot));
      display: flex; flex-direction: column; gap: 10px;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      position: relative;
    }
    .controls-view::before {
      content: 'CONTROL CENTER';
      display: block; font-size: 9px; letter-spacing: 5px;
      color: var(--text-dim); text-transform: uppercase;
      font-family: 'Share Tech Mono', monospace;
      padding-bottom: 10px; text-align: center;
    }

    /* Glass card */
    .ctrl-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(0,136,255,0.12);
      overflow: hidden;
      transition: box-shadow .3s;
    }
    .ctrl-card.open { box-shadow: 0 8px 40px rgba(0,136,255,0.15), inset 0 1px 0 rgba(0,136,255,0.2); }

    .ctrl-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 144px; cursor: pointer;
      user-select: none; -webkit-user-select: none;
    }
    .ctrl-left { display: flex; align-items: center; gap: 18px; }
    .ctrl-icon { font-size: 44px; line-height: 1; }
    .ctrl-name { font-size: 16px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text); }
    .ctrl-status-badge {
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 10px; border-radius: 20px; border: 1px solid;
      transition: all .3s;
    }
    .ctrl-status-badge.off     { color: var(--text-dim); border-color: var(--border); background: rgba(255,255,255,0.03); }
    .ctrl-status-badge.on      { color: var(--green); border-color: var(--green); background: rgba(64,224,128,0.1); box-shadow: 0 0 8px rgba(64,224,128,0.2); }
    .ctrl-status-badge.running { color: var(--accent2); border-color: var(--accent); background: var(--glow2); box-shadow: 0 0 8px var(--glow); animation: pulse 1.5s infinite; }

    .ctrl-chevron {
      color: var(--text-dim); font-size: 12px; transition: transform .3s ease;
    }
    .ctrl-card.open .ctrl-chevron { transform: rotate(180deg); color: var(--accent2); }

    /* Expanded panel */
    .ctrl-expanded {
      max-height: 0; overflow: hidden;
      transition: max-height .4s cubic-bezier(.4,0,.2,1), padding .3s;
      border-top: 0px solid var(--border);
    }
    .ctrl-card.open .ctrl-expanded {
      max-height: 2000px;
      border-top-width: 1px;
    }
    .ctrl-expanded-inner { padding: 20px 18px 24px; display: flex; flex-direction: column; gap: 20px; }

    /* Toggle row */
    .ctrl-toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .ctrl-toggle-label { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--text); }

    .toggle-switch {
      position: relative; width: 56px; height: 30px;
      background: var(--border); border-radius: 15px;
      cursor: pointer; transition: background .3s, box-shadow .3s;
      border: 1px solid var(--glass-border);
    }
    .toggle-switch.on { background: var(--accent); box-shadow: 0 0 16px var(--glow); }
    .toggle-knob {
      position: absolute; top: 3px; left: 3px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--text); transition: transform .3s cubic-bezier(.4,0,.2,1), background .3s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .toggle-switch.on .toggle-knob { transform: translateX(26px); background: #fff; }

    /* Pot graphic */
    .pot-section { display: flex; flex-direction: column; gap: 10px; }
    .pot-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); font-family: 'Share Tech Mono', monospace; display: flex; justify-content: space-between; }
    .pot-graphic {
      position: relative; height: 80px;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .pot-svg { width: 70px; height: 80px; }
    .pot-fill-rect { transition: height .5s ease, y .5s ease; }
    .pot-pct {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-family: 'Share Tech Mono', monospace; font-size: 14px; font-weight: bold;
      color: var(--text); text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    /* ── Control card sub-elements ── */
    .ctrl-secondary {
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      letter-spacing: 1px; text-transform: uppercase; color: var(--accent2);
    }

    .ctrl-progress { display: flex; flex-direction: column; gap: 8px; }
    .ctrl-progress-label {
      display: flex; justify-content: space-between;
      font-family: 'Share Tech Mono', monospace; font-size: 10px;
      letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase;
    }
    .ctrl-progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .ctrl-progress-fill {
      height: 100%; background: var(--accent); border-radius: 3px;
      transition: width .6s ease; box-shadow: 0 0 8px var(--glow);
    }
    .ctrl-progress-fill.green { background: var(--green); box-shadow: 0 0 8px rgba(64,224,128,0.4); }
    .ctrl-progress-fill.red   { background: var(--red);   box-shadow: 0 0 8px rgba(255,64,64,0.4); }

    .ctrl-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .ctrl-info-cell {
      background: rgba(0,136,255,0.05); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .ctrl-info-cell-label {
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
    }
    .ctrl-info-cell-value {
      font-family: 'Share Tech Mono', monospace; font-size: 18px;
      font-weight: bold; color: var(--accent2);
    }

    .ctrl-btn {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      color: var(--text-dim); font-family: 'Rajdhani', sans-serif;
      font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
      padding: 11px 14px; cursor: pointer; border-radius: 10px;
      transition: border-color .2s, color .2s, box-shadow .2s;
      width: 100%; text-align: left;
    }
    .ctrl-btn:active { border-color: var(--accent); color: var(--accent2); box-shadow: 0 0 10px var(--glow); }
    .ctrl-btn-row { display: flex; gap: 8px; }
    .ctrl-btn-row .ctrl-btn { flex: 1; text-align: center; }

    /* ── Config panel ── */
    .cfg-overlay { position: fixed; inset: 0; background: #00000077; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .3s; }
    .cfg-overlay.open { opacity: 1; pointer-events: all; }

    .cfg-panel {
      position: fixed; bottom: -100%; left: 0; right: 0; max-height: 88dvh;
      background: rgba(4,15,30,0.92);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border-top: 1px solid var(--accent);
      box-shadow: 0 -8px 60px rgba(0,136,255,0.2);
      z-index: 101; display: flex; flex-direction: column;
      transition: bottom .35s cubic-bezier(.4,0,.2,1);
      border-radius: 20px 20px 0 0; overflow: hidden;
    }
    .cfg-panel.open { bottom: 0; }

    .cfg-drag { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
    .cfg-header {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: rgba(0,136,255,0.05); flex-shrink: 0; position: relative;
    }
    .cfg-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg,transparent,var(--accent2),transparent); }
    .cfg-title   { font-size: 13px; font-weight: 700; letter-spacing: 4px; color: var(--accent2); text-transform: uppercase; }
    .cfg-subtitle{ font-size: 9px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; margin-top: 2px; }
    .cfg-close   { position: absolute; top: 12px; right: 16px; background: none; border: 1px solid var(--border); color: var(--text-dim); font-size: 16px; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; }

    .cfg-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; -webkit-overflow-scrolling: touch; padding-bottom: calc(20px + var(--safe-bot)); }

    .cfg-section-title { font-size: 10px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .cfg-section-title::before { content: ''; width: 3px; height: 12px; background: var(--accent2); box-shadow: 0 0 6px var(--glow); flex-shrink: 0; }

    .cfg-row { display: flex; flex-direction: column; gap: 8px; }
    .cfg-row-label { display: flex; justify-content: space-between; align-items: center; }
    .cfg-row-label span:first-child { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--text); }
    .cfg-val { font-family: 'Share Tech Mono', monospace; font-size: 14px; color: var(--accent2); min-width: 40px; text-align: right; }

    input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: var(--border); outline: none; cursor: pointer; border-radius: 2px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: var(--accent2); border-radius: 50%; box-shadow: 0 0 10px var(--glow); }
    input[type=range]::-moz-range-thumb { width: 22px; height: 22px; background: var(--accent2); border: none; border-radius: 50%; }
    .range-hints { display: flex; justify-content: space-between; margin-top: 2px; }
    .range-hints span { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }

    .voice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .voice-btn {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
      font-size: 10px; padding: 12px 10px; cursor: pointer;
      text-align: left; line-height: 1.4; position: relative; overflow: hidden;
      transition: border-color .2s, color .2s, background .2s; min-height: 52px;
      border-radius: 10px;
    }
    .voice-btn.selected { border-color: var(--accent2); color: var(--accent2); background: var(--glow2); box-shadow: 0 0 16px var(--glow2); }
    .voice-tag { font-size: 8px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; display: block; margin-top: 3px; }
    .voice-btn.selected .voice-tag { color: var(--accent); }

    .cfg-apply {
      background: var(--accent); border: none; color: #fff;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 14px; letter-spacing: 4px; text-transform: uppercase;
      padding: 16px; cursor: pointer; width: 100%;
      transition: background .2s, box-shadow .2s; min-height: 52px; border-radius: 10px;
      box-shadow: 0 4px 20px var(--glow2);
    }
    .cfg-apply:active { background: var(--accent2); box-shadow: 0 4px 30px var(--glow); }

    .cfg-feedback { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--green); letter-spacing: 2px; text-align: center; min-height: 18px; transition: opacity .3s; }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    @keyframes blink  { 50% { opacity:0; } }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ════════════════ DESKTOP ════════════════ */
    @media (min-width: 700px) {
      #statusText { display: inline; }
      .toolbar    { display: none; }
      header      { padding: 10px 20px; }

      .hdr-btn {
        background: var(--glass-bg); border: 1px solid var(--glass-border);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        color: var(--text-dim); font-family: 'Rajdhani', sans-serif;
        font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
        padding: 5px 14px; cursor: pointer;
        transition: border-color .2s, color .2s, box-shadow .2s; border-radius: 6px;
      }
      .hdr-btn:hover  { border-color: var(--accent); color: var(--accent2); box-shadow: 0 0 10px var(--glow2); }
      .hdr-btn.active { border-color: var(--accent); color: var(--accent2); box-shadow: 0 0 12px var(--glow); background: var(--glow2); }

      .sidebar {
        display: flex; flex-direction: column; width: 200px; flex-shrink: 0;
        border-right: 1px solid var(--border); background: rgba(4,15,30,0.8); padding: 16px 0; gap: 4px;
      }
      .sidebar-label { font-size: 10px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; padding: 0 16px 8px; }
      .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 16px; font-size: 12px; }
      .stat-row span:first-child { color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; font-size: 11px; }
      .stat-row span:last-child  { font-family: 'Share Tech Mono', monospace; color: var(--accent2); font-size: 12px; }
      .divider { border: none; border-top: 1px solid var(--border); margin: 10px 16px; }
      .queue-list { flex: 1; overflow-y: auto; padding: 0 8px; }
      .queue-item { padding: 8px; font-size: 11px; font-family: 'Share Tech Mono', monospace; color: var(--text-dim); border-left: 2px solid transparent; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .queue-item.done       { border-color: var(--green); color: var(--text); }
      .queue-item.processing { border-color: var(--accent2); color: var(--accent2); animation: pulse 1s infinite; }
      .queue-item.error      { border-color: var(--red); }

      .messages  { padding: 20px; gap: 16px; }
      .input-bar { padding: 14px 20px; }

      .cfg-panel {
        top: 0; bottom: auto; left: auto; right: -480px; width: 440px; max-height: 100%;
        border-top: none; border-left: 1px solid var(--accent);
        box-shadow: -8px 0 60px rgba(0,136,255,0.15);
        border-radius: 0; transition: right .35s cubic-bezier(.4,0,.2,1);
      }
      .cfg-panel.open { right: 0; }
      .cfg-drag { display: none; }

      .controls-view { padding: 20px; gap: 12px; }
      .ctrl-card { max-width: 600px; margin: 0 auto; width: 100%; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-left">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L20 8.5v7L12 19.82 4 15.5v-7L12 4.18z"/></svg>
    </div>
    <div class="title-block">
      <h1>PI ASSISTANT</h1>
      <p>Local Intelligence System</p>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">CHECKING</span>

    <button class="hdr-btn" id="modeToggleDesk" onclick="toggleMode()">LOCAL</button>

    <button class="hdr-btn" onclick="clearSession()">CLEAR</button>

<!-- ── Tab bar ── -->
<div class="tab-bar">

  <button class="tab-btn"        id="tabTerm"    onclick="switchTab('term')">TERMINAL</button>
  <button class="tab-btn"        id="tabControl" onclick="switchTab('control')">CONTROLS</button>
</div>

<!-- ══════════════ CHAT VIEW ══════════════ -->
<div class="view active" id="viewChat">
  <div class="mode-banner">
    <div class="mode-label" id="modeBannerLabel">LOCAL · QWEN 2.5 14B</div>
    <div class="mode-sublabel" id="modeBannerSub">RUNNING ON LAPTOP VIA ETHERNET</div>

  <div class="main">

          <rect class="bd1-detail" x="16" y="42" width="10" height="6" rx="2"/>

          <line class="bd1-detail" x1="28" y1="50" x2="28" y2="58"/>

</div>

<!-- ══════════════ TERMINAL VIEW ══════════════ -->
<div class="view" id="viewTerm">

    <svg class="bd1-corner" id="bd1TermCorner" viewBox="0 0 56 76" xmlns="http://www.w3.org/2000/svg">
      <rect class="bd1-leg" x="13" y="58" width="9" height="14" rx="4"/>

        <rect class="bd1-head-shell" x="12" y="18" width="32" height="22" rx="8"/>

<!-- ── Mobile toolbar ── -->
<div class="toolbar">

    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 11.5v-3H9v3L5.5 12 9 8.5v3h6v-3l3.5 3.5-3.5 3.5z"/></svg>

    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    <span>CONFIG</span>
  </button>
  <button class="tool-btn" onclick="clearSession()">
    <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>

<!-- ── Config panel ── -->
<div class="cfg-overlay" id="cfgOverlay" onclick="closeConfig()"></div>
<div class="cfg-panel" id="cfgPanel">
  <div class="cfg-drag"></div>
  <div class="cfg-header">
    <div class="cfg-title">System Config</div>
    <div class="cfg-subtitle">Voice &amp; Transmission Parameters</div>

  </div>
  <div class="cfg-body">

      <div class="cfg-section-title">Voice Module</div>
      <div class="voice-grid" id="voiceGrid"><div class="voice-btn" style="opacity:.4">Loading...</div></div>
    </div>

      <div class="cfg-section-title">Speech Rate</div>

        <div class="cfg-row-label">
          <span>Length Scale</span>

        </div>
        <input type="range" id="lsSlider" min="0.6" max="2.0" step="0.05" value="1.25"
          oninput="document.getElementById('lsVal').textContent = parseFloat(this.value).toFixed(2)" />

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const SESSION_ID = 'web-' + Math.random().toString(36).slice(2, 7);
  let isStreaming   = false;
  let ttsEnabled    = false;
  let claudeMode    = false;
  let currentAudio  = null;
  let selectedVoice = 'en_US-lessac-medium';
  const queuedJobs  = {};

  document.getElementById('statSession').textContent = SESSION_ID.slice(4).toUpperCase();

  // ── BD-1 ───────────────────────────────────────────────────────────────────
  function showBD1Thinking() {
    const el = document.getElementById('bd1Indicator');
    el.classList.add('visible');
    el.classList.remove('talking');
    document.getElementById('bd1BubbleText').textContent = '';
  }
  function showBD1Talking(text) {
    const el = document.getElementById('bd1Indicator');
    el.classList.add('visible', 'talking');
    const bt = document.getElementById('bd1BubbleText');
    bt.textContent = text;
    bt.scrollTop = bt.scrollHeight;
  }
  function hideBD1() {
    const el = document.getElementById('bd1Indicator');
    el.classList.remove('visible', 'talking');
  }

  function exciteBD1(cornerId) {
    const el = document.getElementById(cornerId);
    if (!el) return;
    el.classList.add('active', 'excited');
    setTimeout(() => el.classList.remove('excited', 'active'), 2000);
  }

  // ── Mode toggle ────────────────────────────────────────────────────────────
  function toggleMode() {
    claudeMode = !claudeMode;
    document.body.classList.toggle('claude-mode', claudeMode);
    const label = claudeMode ? 'CLAUDE' : 'LOCAL';
    document.getElementById('modeToggleDesk').textContent = label;
    document.getElementById('modeToggleMob').querySelector('span').textContent = label;
    document.getElementById('modeToggleMob').classList.toggle('active', claudeMode);
    document.getElementById('modeToggleDesk').classList.toggle('active', claudeMode);
    document.getElementById('statMode').textContent = label;
    if (claudeMode) {
      document.getElementById('modeBannerLabel').textContent = 'CLAUDE · SONNET 4.6';
      document.getElementById('modeBannerSub').textContent   = 'RUNNING VIA PI · FULL TOOL ACCESS';
      document.getElementById('statModel').textContent = 'CLAUDE';
    } else {
      document.getElementById('modeBannerLabel').textContent = 'LOCAL · QWEN 2.5 14B';
      document.getElementById('modeBannerSub').textContent   = 'RUNNING ON LAPTOP VIA ETHERNET';
      document.getElementById('statModel').textContent = 'QWEN';
    }
    stopTTS();
    document.getElementById('messages').innerHTML = '';
    fetch(`/sessions/${SESSION_ID}/clear`);
  }

  // ── TTS ────────────────────────────────────────────────────────────────────
  function toggleTTS() {
    ttsEnabled = !ttsEnabled;
    const label = ttsEnabled ? 'TTS ON' : 'TTS OFF';
    document.getElementById('ttsToggleDesk').textContent = label;
    document.getElementById('ttsToggleMob').querySelector('span').textContent = label;
    document.getElementById('ttsToggleDesk').classList.toggle('active', ttsEnabled);
    document.getElementById('ttsToggleMob').classList.toggle('active', ttsEnabled);
    if (!ttsEnabled) stopTTS();
  }

  const ttsQueue = [];
  let ttsPlaying = false;

  async function enqueueTTS(text) {
    if (!ttsEnabled || !text.trim()) return;
    ttsQueue.push(text);
    if (!ttsPlaying) playNextChunk();
  }

  async function playNextChunk() {
    if (!ttsQueue.length) { ttsPlaying = false; return; }
    ttsPlaying = true;
    const text = ttsQueue.shift();
    try {
      const r    = await fetch('/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({text}) });
      const blob = await r.blob();
      const url  = URL.createObjectURL(blob);
      currentAudio = new Audio(url);
      currentAudio.play();
      currentAudio.onended = () => { URL.revokeObjectURL(url); playNextChunk(); };
    } catch { playNextChunk(); }
  }

  function stopTTS() {
    ttsQueue.length = 0;
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    ttsPlaying = false;
  }

  // ── Messages ───────────────────────────────────────────────────────────────
  function addMessage(role, content, streaming = false) {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = `msg ${role}${streaming ? ' streaming' : ''}`;
    const aiLabel = claudeMode ? 'CLAUDE' : 'QWEN';
    div.innerHTML = `<div class="msg-meta">${role==='user'?'YOU':aiLabel} · ${new Date().toLocaleTimeString()}</div><div class="msg-bubble"></div>`;
    div.querySelector('.msg-bubble').textContent = content;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function updateMessage(div, content, done = false) {
    div.querySelector('.msg-bubble').textContent = content;
    if (done) div.classList.remove('streaming');
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('input');
    const msg   = input.value.trim();
    if (!msg || isStreaming) return;

    isStreaming = true;
    input.value = '';
    autoResize(input);
    input.blur();
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('statusDot').className    = 'status-dot busy';
    document.getElementById('statusText').textContent  = 'PROCESSING';
    showBD1Thinking();

    addMessage('user', msg);
    const aiDiv = addMessage('ai', '', true);
    const endpoint = claudeMode ? '/claude' : '/chat';

    try {
      const r = await fetch(endpoint, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ message: msg, session_id: SESSION_ID + (claudeMode?'-claude':''), stream: true }),
      });

      const reader  = r.body.getReader();
      const decoder = new TextDecoder();
      let full = '', wordBuf = '';
      stopTTS();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        full += chunk;
        updateMessage(aiDiv, full);
        showBD1Talking(full);
        for (const char of chunk) {
          wordBuf += char;
          if (/[.!?;]/.test(char) && wordBuf.trim().length > 2) {
            enqueueTTS(wordBuf.trim());
            wordBuf = '';
          }
        }
      }
      if (wordBuf.trim()) enqueueTTS(wordBuf.trim());
      updateMessage(aiDiv, full, true);
    } catch(e) {
      updateMessage(aiDiv, 'Connection error: ' + e.message, true);
    }

    hideBD1();
    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('statusDot').className    = 'status-dot online';
    document.getElementById('statusText').textContent  = 'ONLINE';
  }

  // ── Queue ──────────────────────────────────────────────────────────────────
  async function pollJob(jobId) {
    const iv = setInterval(async () => {
      const d = await (await fetch(`/queue/${jobId}`)).json();
      queuedJobs[jobId] = d;
      renderQueue();
      document.getElementById('statQueued').textContent =
        Object.values(queuedJobs).filter(j=>['queued','processing'].includes(j.status)).length;
      if (d.status==='done'||d.status==='error') clearInterval(iv);
    }, 1000);
  }

  function renderQueue() {
    const list = document.getElementById('queueList');
    list.innerHTML = '';
    Object.entries(queuedJobs).reverse().forEach(([id,job]) => {
      const div = document.createElement('div');
      div.className = `queue-item ${job.status}`;
      div.textContent = `[${id}] ${(job.message||'').slice(0,22)}`;
      div.title = job.result || job.message;
      list.appendChild(div);
    });
  }

  // ── Clear ──────────────────────────────────────────────────────────────────
  async function clearSession() {
    stopTTS(); hideBD1();
    await fetch(`/sessions/${SESSION_ID}/clear`);

  function handleKey(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); } }
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

  // ── Tab switching ──────────────────────────────────────────────────────────
  let termInitialized = false;
  let term, fitAddon, termSocket;

  function switchTab(tab) {
    ['chat','term','control'].forEach(t => {
      document.getElementById('view'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active', t===tab);
      document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active', t===tab);
    });
    document.querySelector('.toolbar').style.display = tab==='term' ? 'none' : '';
    if (tab==='term' && !termInitialized) initTerminal();
    if (tab==='term' && fitAddon) setTimeout(()=>fitAddon.fit(), 100);
    if (tab==='control') loadControls();
  }

  // ── Terminal ───────────────────────────────────────────────────────────────
  function initTerminal() {
    termInitialized = true;
    term = new Terminal({
      fontFamily: '"Share Tech Mono", monospace',
      fontSize: 13, lineHeight: 1.3,
      cursorBlink: true, cursorStyle: 'block', scrollback: 2000,
      theme: {
        background: '#020812', foreground: '#eef2f8',
        cursor: '#40b4ff', cursorAccent: '#020812',
        selectionBackground: '#0088ff44',
        black: '#040f1e', red: '#ff4040', green: '#40e080',
        yellow: '#ffaa40', blue: '#0088ff', magenta: '#8040ff',
        cyan: '#40c8ff', white: '#eef2f8',
        brightBlack: '#1a3a5c', brightRed: '#ff6060', brightGreen: '#60f0a0',
        brightYellow: '#ffc060', brightBlue: '#40b4ff', brightMagenta: '#a060ff',
        brightCyan: '#60d8ff', brightWhite: '#ffffff',
      }
    });
    fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('termContainer'));
    fitAddon.fit();

    const proto = location.protocol==='https:'?'wss':'ws';
    termSocket = new WebSocket(`${proto}://${location.host}/ws/terminal`);
    termSocket.binaryType = 'arraybuffer';
    termSocket.onopen    = () => termSocket.send(JSON.stringify({type:'resize',cols:term.cols,rows:term.rows}));
    termSocket.onmessage = (e) => { if (e.data instanceof ArrayBuffer) term.write(new Uint8Array(e.data)); else term.write(e.data); };
    termSocket.onclose   = () => term.write('\r\n\x1b[33m[connection closed]\x1b[0m\r\n');
    term.onData(data => { if (termSocket.readyState===WebSocket.OPEN) termSocket.send(new TextEncoder().encode(data)); });
    term.onResize(({cols,rows}) => { if (termSocket.readyState===WebSocket.OPEN) termSocket.send(JSON.stringify({type:'resize',cols,rows})); });
    window.addEventListener('resize', () => { if (fitAddon) fitAddon.fit(); });
  }

  function sendCmd(cmd) {
    if (!term||!termSocket||termSocket.readyState!==WebSocket.OPEN) return;
    termSocket.send(new TextEncoder().encode(cmd));
    term.focus();
  }

        const ram  = ctrl.ram_pct  || 41;
        const tempColor = temp > 70 ? 'var(--red)' : temp > 58 ? 'var(--accent2)' : 'var(--green)';
        return `
        <div class="ctrl-info-grid">
          <div class="ctrl-info-cell">
            <div class="ctrl-info-cell-label">CPU Temp</div>
            <div class="ctrl-info-cell-value" style="color:${tempColor};">${temp}°C</div>
          </div>
          <div class="ctrl-info-cell">
            <div class="ctrl-info-cell-label">Uptime</div>
            <div class="ctrl-info-cell-value" style="font-size:14px;">3d 14h</div>
          </div>
        </div>
        <div class="ctrl-progress">
          <div class="ctrl-progress-label"><span>RAM Usage</span><span>${ram}%</span></div>
          <div class="ctrl-progress-bar"><div class="ctrl-progress-fill ${ram>80?'red':''}" style="width:${ram}%"></div></div>
        </div>
        <div class="ctrl-progress">
          <div class="ctrl-progress-label"><span>CPU Usage</span><span>12%</span></div>
          <div class="ctrl-progress-bar"><div class="ctrl-progress-fill" style="width:12%"></div></div>
        </div>
        <div class="ctrl-info-grid">
          <div class="ctrl-info-cell">
            <div class="ctrl-info-cell-label">Frequency</div>
            <div class="ctrl-info-cell-value" style="font-size:13px;">2.4GHz</div>
          </div>
          <div class="ctrl-info-cell">
            <div class="ctrl-info-cell-label">Throttling</div>
            <div class="ctrl-info-cell-value" style="font-size:11px;color:var(--green);">NONE</div>
          </div>
        </div>`;
      }

      default:
        return `<div style="color:var(--text-dim);font-size:12px;letter-spacing:2px">NO CONTROLS DEFINED</div>`;
    }
  }

  function toggleControlCard(id) {
    const card = document.querySelector(`.ctrl-card[data-id="${id}"]`);
    if (!card) return;
    const wasOpen = card.classList.contains('open');
    card.classList.toggle('open');
    if (!wasOpen && id === 'coffee_maker') startPotAnimation(id);
    else if (wasOpen && id === 'coffee_maker') stopPotAnimation();
  }

  async function toggleControl(id) {
    try {
      const updated = await (await fetch(`/controls/${id}/toggle`, {method:'POST'})).json();
      controlsData[id] = updated;
      // update badge
      const badge = document.getElementById(`badge-${id}`);
      const tog   = document.getElementById(`toggle-${id}`);
      if (badge) { badge.textContent = updated.running ? 'RUNNING' : 'STANDBY'; badge.className = `ctrl-status-badge ${updated.running?'running':'off'}`; }
      if (tog)   { tog.classList.toggle('on', updated.running); }
      exciteBD1('bd1CtrlCorner');
    } catch(e) { console.warn(e); }
  }

  function startPotAnimation(id) {
    stopPotAnimation();
    let level = 0;
    let dir   = 1;
    potAnimInterval = setInterval(() => {
      level += dir * 0.8;
      if (level >= 100) { level = 100; dir = -1; }
      if (level <= 0)   { level = 0;   dir = 1; }
      updatePotLevel(id, level);
    }, 50);
  }

  function stopPotAnimation() {
    if (potAnimInterval) { clearInterval(potAnimInterval); potAnimInterval = null; }
  }

  function updatePotLevel(id, pct) {
    const fill  = document.getElementById(`pot-fill-${id}`);
    const label = document.getElementById('pot-pct-label');
    const disp  = document.getElementById('pot-pct-display');
    const h = pct * 0.57;
    const y = 68 - h;
    if (fill)  { fill.setAttribute('height', h); fill.setAttribute('y', y); }
    if (label) label.textContent = Math.round(pct) + '%';
    if (disp)  disp.textContent  = Math.round(pct) + '%';
  }

  // ── Config ─────────────────────────────────────────────────────────────────
  async function openConfig() {
    document.getElementById('cfgOverlay').classList.add('open');
    document.getElementById('cfgPanel').classList.add('open');
    try {
      const [cfgR, voiceR] = await Promise.all([fetch('/tts/config'), fetch('/tts/voices')]);
      const cfg = await cfgR.json(); const voices = await voiceR.json();
      document.getElementById('lsSlider').value = cfg.length_scale;
      document.getElementById('lsVal').textContent = parseFloat(cfg.length_scale).toFixed(2);
      selectedVoice = cfg.voice;
      renderVoiceGrid(voices.voices, voices.current);
    } catch(e) { console.warn(e); }
  }

  function closeConfig() {
    document.getElementById('cfgOverlay').classList.remove('open');
    document.getElementById('cfgPanel').classList.remove('open');
  }

  function renderVoiceGrid(voices, current) {
    selectedVoice = current;
    const grid = document.getElementById('voiceGrid');
    grid.innerHTML = '';
    voices.forEach(v => {
      const parts = v.split('-');
      const btn = document.createElement('button');
      btn.className = 'voice-btn' + (v===current?' selected':'');
      btn.innerHTML = `${parts.slice(1,-1).join(' ').toUpperCase()}<span class="voice-tag">${parts[0]} · ${parts[parts.length-1]}</span>`;
      btn.onclick = () => { document.querySelectorAll('.voice-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); selectedVoice=v; };
      grid.appendChild(btn);
    });
  }

  async function applyConfig() {
    try {
      await fetch('/tts/config', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ voice: selectedVoice, length_scale: parseFloat(document.getElementById('lsSlider').value) }) });
      const fb = document.getElementById('cfgFeedback');
      fb.textContent = '// CONFIG APPLIED'; fb.style.opacity='1';
      setTimeout(()=>{ fb.style.opacity='0'; }, 2500);
    } catch(e) { document.getElementById('cfgFeedback').textContent = 'ERROR: '+e.message; }
  }

  // ── Inertia scroll ─────────────────────────────────────────────────────────
  function addInertiaScroll(el) {
    let startY = 0, startScroll = 0, velY = 0, lastY = 0, lastT = 0;
    let rafId = null, dragging = false;

    el.addEventListener('touchstart', e => {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      dragging = true; velY = 0;
      startY = lastY = e.touches[0].clientY;
      startScroll = el.scrollTop;
      lastT = performance.now();
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      if (!dragging) return;
      const y = e.touches[0].clientY;
      const now = performance.now();
      const dt  = Math.max(now - lastT, 1);
      velY = (lastY - y) / dt * 16;
      el.scrollTop = startScroll + (startY - y);
      lastY = y; lastT = now;
    }, { passive: true });

    el.addEventListener('touchend', () => {
      dragging = false;
      const glide = () => {
        velY *= 0.91;
        el.scrollTop += velY;
        if (Math.abs(velY) > 0.4) rafId = requestAnimationFrame(glide);
        else rafId = null;
      };
      rafId = requestAnimationFrame(glide);
    }, { passive: true });
  }

  // apply inertia to controls scroll container once DOM ready
  addInertiaScroll(document.getElementById('controlsContainer'));
</script>
