<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PI ASSISTANT</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');

    :root {
      --bg:       #0a0b0d;
      --surface:  #0f1115;
      --panel:    #13161b;
      --border:   #1e2530;
      --accent:   #bd6b08;
      --accent2:  #e8890a;
      --glow:     #e8890a55;
      --glow2:    #e8890a22;
      --text:     #c9bfae;
      --text-dim: #5a5448;
      --ai-msg:   #111318;
      --user-msg: #1a1c22;
      --scratch:  #2a1a05;
      --red:      #8b2020;
      --green:    #4caf50;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .logo-mark {
      width: 36px; height: 36px;
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      background: var(--scratch);
      box-shadow: 0 0 12px var(--glow);
    }
    .logo-mark svg { width: 18px; height: 18px; fill: var(--accent2); }

    .title-block h1 {
      font-size: 18px; font-weight: 700;
      letter-spacing: 4px; color: var(--accent2); text-transform: uppercase;
    }
    .title-block p {
      font-size: 10px; letter-spacing: 3px;
      color: var(--text-dim); text-transform: uppercase;
    }

    .header-right { display: flex; align-items: center; gap: 14px; }

    .status-pill {
      display: flex; align-items: center; gap: 7px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: var(--text-dim); letter-spacing: 1px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #444;
      transition: background .3s, box-shadow .3s;
    }
    .status-dot.online  { background: var(--green); box-shadow: 0 0 6px #4caf5088; }
    .status-dot.busy    { background: var(--accent2); box-shadow: 0 0 6px var(--glow); }
    .status-dot.offline { background: var(--red); }

    .hdr-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'Rajdhani', sans-serif;
      font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
      padding: 5px 14px; cursor: pointer;
      transition: border-color .2s, color .2s, box-shadow .2s;
    }
    .hdr-btn:hover        { border-color: var(--accent); color: var(--accent2); }
    .hdr-btn.active       { border-color: var(--accent); color: var(--accent2); box-shadow: 0 0 8px var(--glow); }

    /* ── Layout ── */
    .main { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex; flex-direction: column;
      padding: 16px 0; gap: 4px;
    }
    .sidebar-label {
      font-size: 10px; letter-spacing: 3px;
      color: var(--text-dim); text-transform: uppercase;
      padding: 0 16px 8px;
    }
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 16px; font-size: 12px;
    }
    .stat-row span:first-child {
      color: var(--text-dim); letter-spacing: 1px;
      text-transform: uppercase; font-size: 11px;
    }
    .stat-row span:last-child {
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent2); font-size: 12px;
    }
    .divider { border: none; border-top: 1px solid var(--border); margin: 10px 16px; }

    .queue-list { flex: 1; overflow-y: auto; padding: 0 8px; }
    .queue-item {
      padding: 8px; font-size: 11px;
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-dim); border-left: 2px solid transparent;
      margin-bottom: 2px; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .queue-item.done       { border-color: var(--green); color: var(--text); }
    .queue-item.processing { border-color: var(--accent2); color: var(--accent2); animation: pulse 1s infinite; }
    .queue-item.error      { border-color: var(--red); }

    /* ── Chat ── */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 820px; }
    .msg-meta {
      font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
    }
    .msg.user .msg-meta { color: var(--accent); }
    .msg-bubble {
      padding: 12px 16px; border: 1px solid var(--border);
      line-height: 1.6; font-size: 15px;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .msg-bubble { background: var(--user-msg); border-color: #252830; }
    .msg.ai   .msg-bubble {
      background: var(--ai-msg);
      border-color: var(--border); border-left: 2px solid var(--accent);
    }
    .msg.ai.streaming .msg-bubble::after {
      content: '▋'; color: var(--accent2); animation: blink .7s step-end infinite;
    }

    /* ── Input ── */
    .input-bar {
      border-top: 1px solid var(--border); background: var(--surface);
      padding: 14px 20px; display: flex; gap: 12px; align-items: flex-end; flex-shrink: 0;
    }
    .input-wrap {
      flex: 1; border: 1px solid var(--border); background: var(--panel);
      display: flex; align-items: flex-end; transition: border-color .2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    textarea {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Rajdhani', sans-serif;
      font-size: 15px; padding: 10px 14px; resize: none;
      min-height: 44px; max-height: 160px; line-height: 1.5;
    }
    textarea::placeholder { color: var(--text-dim); }
    .send-btn {
      background: var(--accent); border: none; color: #fff;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
      padding: 12px 24px; cursor: pointer; height: 44px; flex-shrink: 0;
      transition: background .2s, box-shadow .2s;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent2); box-shadow: 0 0 16px var(--glow); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ════════════════════════════════════════════════
       CONFIG PANEL — slides in from the right
    ════════════════════════════════════════════════ */
    .cfg-overlay {
      position: fixed; inset: 0; background: #00000066;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    .cfg-overlay.open { opacity: 1; pointer-events: all; }

    .cfg-panel {
      position: fixed; top: 0; right: -480px; width: 440px; height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--accent);
      box-shadow: -8px 0 40px #00000099, -2px 0 0 var(--accent);
      z-index: 101; display: flex; flex-direction: column;
      transition: right .35s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }
    .cfg-panel.open { right: 0; }

    /* panel header */
    .cfg-header {
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #1a1208 0%, var(--surface) 100%);
      flex-shrink: 0;
      position: relative;
    }
    .cfg-header::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    }
    .cfg-title {
      font-size: 14px; font-weight: 700; letter-spacing: 5px;
      color: var(--accent2); text-transform: uppercase;
    }
    .cfg-subtitle {
      font-size: 10px; letter-spacing: 3px;
      color: var(--text-dim); text-transform: uppercase; margin-top: 2px;
    }
    .cfg-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); font-size: 16px; width: 28px; height: 28px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, color .2s;
    }
    .cfg-close:hover { border-color: var(--accent); color: var(--accent2); }

    /* panel body */
    .cfg-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 28px; }

    .cfg-section-title {
      font-size: 10px; letter-spacing: 4px; color: var(--accent);
      text-transform: uppercase; margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .cfg-section-title::before {
      content: ''; width: 3px; height: 12px; background: var(--accent2);
      box-shadow: 0 0 6px var(--glow);
    }

    /* row */
    .cfg-row { display: flex; flex-direction: column; gap: 8px; }
    .cfg-row-label {
      display: flex; justify-content: space-between; align-items: center;
    }
    .cfg-row-label span:first-child {
      font-size: 12px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text);
    }
    .cfg-row-label .cfg-val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px; color: var(--accent2);
      min-width: 36px; text-align: right;
    }

    /* slider */
    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 3px;
      background: var(--border); outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      background: var(--accent2); border-radius: 0;
      box-shadow: 0 0 8px var(--glow);
      clip-path: polygon(50% 0%,100% 50%,50% 100%,0% 50%);
    }
    input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px; background: var(--accent2);
      border: none; border-radius: 0;
    }
    .range-track {
      position: relative; background: var(--border); height: 3px;
    }

    /* voice grid */
    .voice-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .voice-btn {
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
      font-size: 10px; padding: 10px 8px; cursor: pointer;
      text-align: left; transition: border-color .2s, color .2s, background .2s;
      line-height: 1.4; letter-spacing: 0.5px;
      position: relative; overflow: hidden;
    }
    .voice-btn::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 2px; height: 100%; background: transparent;
      transition: background .2s;
    }
    .voice-btn:hover       { border-color: var(--accent); color: var(--text); }
    .voice-btn:hover::before { background: var(--accent); }
    .voice-btn.selected    {
      border-color: var(--accent2); color: var(--accent2);
      background: var(--scratch);
      box-shadow: inset 0 0 12px var(--glow2);
    }
    .voice-btn.selected::before { background: var(--accent2); box-shadow: 0 0 6px var(--glow); }
    .voice-tag {
      font-size: 8px; letter-spacing: 2px; color: var(--text-dim);
      text-transform: uppercase; display: block; margin-top: 2px;
    }
    .voice-btn.selected .voice-tag { color: var(--accent); }

    /* apply btn */
    .cfg-apply {
      background: var(--accent); border: none; color: #fff;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 13px; letter-spacing: 4px; text-transform: uppercase;
      padding: 14px; cursor: pointer; width: 100%;
      transition: background .2s, box-shadow .2s;
      margin-top: 8px;
      position: relative; overflow: hidden;
    }
    .cfg-apply::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, #ffffff22, transparent);
      transition: left .4s;
    }
    .cfg-apply:hover { background: var(--accent2); box-shadow: 0 0 20px var(--glow); }
    .cfg-apply:hover::before { left: 100%; }

    .cfg-feedback {
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      color: var(--green); letter-spacing: 2px; text-align: center;
      min-height: 18px; transition: opacity .3s;
    }

    /* decorative scan line */
    .scan-line {
      position: fixed; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--accent2) 50%, transparent 100%);
      opacity: 0; animation: scan 4s ease-in-out infinite;
      pointer-events: none; z-index: 999;
    }
    @keyframes scan {
      0%   { top: 0;    opacity: 0; }
      5%   { opacity: .6; }
      95%  { opacity: .2; }
      100% { top: 100%; opacity: 0; }
    }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
    @keyframes blink { 50% { opacity: 0; } }

    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>

<div class="scan-line"></div>

<!-- ── Header ── -->
<header>
  <div class="header-left">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L20 8.5v7L12 19.82 4 15.5v-7L12 4.18z"/></svg>
    </div>
    <div class="title-block">
      <h1>PI ASSISTANT</h1>
      <p>Local Intelligence System</p>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">CHECKING</span>
    </div>
    <button class="hdr-btn" id="ttsToggle" onclick="toggleTTS()">TTS OFF</button>
    <button class="hdr-btn" onclick="openConfig()">CONFIG</button>
    <button class="hdr-btn" onclick="clearSession()">CLEAR</button>
  </div>
</header>

<!-- ── Main ── -->
<div class="main">
  <div class="sidebar">
    <div class="sidebar-label">System</div>
    <div class="stat-row"><span>Model</span><span id="statModel">—</span></div>
    <div class="stat-row"><span>Session</span><span id="statSession">—</span></div>
    <div class="stat-row"><span>Queued</span><span id="statQueued">0</span></div>
    <hr class="divider" />
    <div class="sidebar-label">Queue</div>
    <div class="queue-list" id="queueList"></div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="Transmit message..."
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">SEND</button>
    </div>
  </div>
</div>

<!-- ── Config panel ── -->
<div class="cfg-overlay" id="cfgOverlay" onclick="closeConfig()"></div>
<div class="cfg-panel" id="cfgPanel">
  <div class="cfg-header">
    <div class="cfg-title">System Config</div>
    <div class="cfg-subtitle">Voice &amp; Transmission Parameters</div>
    <button class="cfg-close" onclick="closeConfig()">✕</button>
  </div>
  <div class="cfg-body">

    <!-- Voice -->
    <div>
      <div class="cfg-section-title">Voice Module</div>
      <div class="voice-grid" id="voiceGrid">
        <div class="voice-btn" style="opacity:.4">Loading...</div>
      </div>
    </div>

    <!-- Speed -->
    <div>
      <div class="cfg-section-title">Speech Rate</div>
      <div class="cfg-row">
        <div class="cfg-row-label">
          <span>Length Scale</span>
          <span class="cfg-val" id="lsVal">1.25</span>
        </div>
        <input type="range" id="lsSlider" min="0.6" max="2.0" step="0.05" value="1.25"
          oninput="document.getElementById('lsVal').textContent = parseFloat(this.value).toFixed(2)" />
        <div style="display:flex;justify-content:space-between;margin-top:4px">
          <span style="font-size:10px;color:var(--text-dim);letter-spacing:1px">FAST</span>
          <span style="font-size:10px;color:var(--text-dim);letter-spacing:1px">SLOW</span>
        </div>
      </div>
    </div>

    <!-- Chunk thresholds -->
    <div>
      <div class="cfg-section-title">TTS Chunk Thresholds</div>
      <div class="cfg-row" style="margin-bottom:18px">
        <div class="cfg-row-label">
          <span>Initial Words</span>
          <span class="cfg-val" id="iwVal">15</span>
        </div>
        <input type="range" id="iwSlider" min="1" max="30" step="1" value="15"
          oninput="document.getElementById('iwVal').textContent = this.value" />
        <div style="display:flex;justify-content:space-between;margin-top:4px">
          <span style="font-size:10px;color:var(--text-dim);letter-spacing:1px">FASTER START</span>
          <span style="font-size:10px;color:var(--text-dim);letter-spacing:1px">MORE BUFFER</span>
        </div>
      </div>
      <div class="cfg-row">
        <div class="cfg-row-label">
          <span>Subsequent Words</span>
          <span class="cfg-val" id="swVal">3</span>
        </div>
        <input type="range" id="swSlider" min="1" max="20" step="1" value="3"
          oninput="document.getElementById('swVal').textContent = this.value" />
        <div style="display:flex;justify-content:space-between;margin-top:4px">
          <span style="font-size:10px;color:var(--text-dim);letter-spacing:1px">SNAPPIER</span>
          <span style="font-size:10px;color:var(--text-dim);letter-spacing:1px">SMOOTHER</span>
        </div>
      </div>
    </div>

    <div>
      <button class="cfg-apply" onclick="applyConfig()">APPLY CONFIGURATION</button>
      <div class="cfg-feedback" id="cfgFeedback"></div>
    </div>

  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const SESSION_ID = 'web-' + Math.random().toString(36).slice(2, 7);
  let isStreaming = false;
  let ttsEnabled  = false;
  let currentAudio = null;
  const queuedJobs = {};

  // Live TTS params (synced from server on open)
  let cfgInitialWords    = 15;
  let cfgSubsequentWords = 3;
  let selectedVoice      = 'en_US-lessac-medium';

  document.getElementById('statSession').textContent = SESSION_ID.slice(4).toUpperCase();

  // ── TTS toggle ─────────────────────────────────────────────────────────────
  function toggleTTS() {
    ttsEnabled = !ttsEnabled;
    const btn = document.getElementById('ttsToggle');
    btn.textContent = ttsEnabled ? 'TTS ON' : 'TTS OFF';
    btn.classList.toggle('active', ttsEnabled);
    if (!ttsEnabled) stopTTS();
  }

  // ── TTS queue ──────────────────────────────────────────────────────────────
  const ttsQueue = [];
  let ttsPlaying = false;

  async function enqueueTTS(text) {
    if (!ttsEnabled || !text.trim()) return;
    ttsQueue.push(text);
    if (!ttsPlaying) playNextChunk();
  }

  async function playNextChunk() {
    if (!ttsQueue.length) { ttsPlaying = false; return; }
    ttsPlaying = true;
    const text = ttsQueue.shift();
    try {
      const r = await fetch('/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      const blob = await r.blob();
      const url  = URL.createObjectURL(blob);
      currentAudio = new Audio(url);
      currentAudio.play();
      currentAudio.onended = () => { URL.revokeObjectURL(url); playNextChunk(); };
    } catch(e) { console.warn('TTS error:', e); playNextChunk(); }
  }

  function stopTTS() {
    ttsQueue.length = 0;
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    ttsPlaying = false;
  }

  // ── Health check ───────────────────────────────────────────────────────────
  async function checkHealth() {
    try {
      const r = await fetch('/health');
      const d = await r.json();
      document.getElementById('statusDot').className  = 'status-dot online';
      document.getElementById('statusText').textContent = 'ONLINE';
      document.getElementById('statModel').textContent  = d.model.split('-')[0].toUpperCase();
      document.getElementById('statQueued').textContent = d.queued_jobs;
    } catch {
      document.getElementById('statusDot').className  = 'status-dot offline';
      document.getElementById('statusText').textContent = 'OFFLINE';
    }
  }
  setInterval(checkHealth, 5000);
  checkHealth();

  // ── Messages ───────────────────────────────────────────────────────────────
  function addMessage(role, content, streaming = false) {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = `msg ${role}${streaming ? ' streaming' : ''}`;
    div.innerHTML = `
      <div class="msg-meta">${role === 'user' ? 'YOU' : 'QWEN'} &nbsp;·&nbsp; ${new Date().toLocaleTimeString()}</div>
      <div class="msg-bubble"></div>`;
    div.querySelector('.msg-bubble').textContent = content;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function updateMessage(div, content, done = false) {
    div.querySelector('.msg-bubble').textContent = content;
    if (done) div.classList.remove('streaming');
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('input');
    const msg   = input.value.trim();
    if (!msg || isStreaming) return;

    isStreaming = true;
    input.value = '';
    autoResize(input);
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('statusDot').className   = 'status-dot busy';
    document.getElementById('statusText').textContent = 'PROCESSING';

    addMessage('user', msg);
    const aiDiv = addMessage('ai', '', true);

    try {
      const r = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, session_id: SESSION_ID, stream: true }),
      });

      const reader  = r.body.getReader();
      const decoder = new TextDecoder();
      let full    = '';
      let wordBuf = '';
      stopTTS();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        full += chunk;
        updateMessage(aiDiv, full);

          for (const char of chunk) {
          wordBuf += char;
          if (/[.!?;]/.test(char) && wordBuf.trim().length > 2) {
            enqueueTTS(wordBuf.trim());
            wordBuf = '';
          }
        }
      }

      if (wordBuf.trim()) enqueueTTS(wordBuf.trim());
      updateMessage(aiDiv, full, true);
    } catch(e) {
      updateMessage(aiDiv, 'Connection error: ' + e.message, true);
    }

    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('statusDot').className   = 'status-dot online';
    document.getElementById('statusText').textContent = 'ONLINE';
  }

  // ── Queue ──────────────────────────────────────────────────────────────────
  async function pollJob(jobId) {
    const interval = setInterval(async () => {
      const r = await fetch(`/queue/${jobId}`);
      const d = await r.json();
      queuedJobs[jobId] = d;
      renderQueue();
      document.getElementById('statQueued').textContent =
        Object.values(queuedJobs).filter(j => ['queued','processing'].includes(j.status)).length;
      if (d.status === 'done' || d.status === 'error') clearInterval(interval);
    }, 1000);
  }

  function renderQueue() {
    const list = document.getElementById('queueList');
    list.innerHTML = '';
    Object.entries(queuedJobs).reverse().forEach(([id, job]) => {
      const div = document.createElement('div');
      div.className = `queue-item ${job.status}`;
      div.textContent = `[${id}] ${(job.message || '').slice(0, 22)}`;
      div.title = job.result || job.message;
      list.appendChild(div);
    });
  }

  // ── Clear session ──────────────────────────────────────────────────────────
  async function clearSession() {
    stopTTS();
    await fetch(`/sessions/${SESSION_ID}/clear`);
    document.getElementById('messages').innerHTML = '';
  }

  // ── Input helpers ──────────────────────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  // ── Config panel ───────────────────────────────────────────────────────────
  async function openConfig() {
    document.getElementById('cfgOverlay').classList.add('open');
    document.getElementById('cfgPanel').classList.add('open');

    // Load current config from server
    try {
      const [cfgR, voiceR] = await Promise.all([
        fetch('/tts/config'),
        fetch('/tts/voices'),
      ]);
      const cfg    = await cfgR.json();
      const voices = await voiceR.json();

      // Sync sliders
      document.getElementById('lsSlider').value = cfg.length_scale;
      document.getElementById('lsVal').textContent = parseFloat(cfg.length_scale).toFixed(2);
      document.getElementById('iwSlider').value = cfg.initial_words;
      document.getElementById('iwVal').textContent = cfg.initial_words;
      document.getElementById('swSlider').value = cfg.subsequent_words;
      document.getElementById('swVal').textContent = cfg.subsequent_words;
      cfgInitialWords    = cfg.initial_words;
      cfgSubsequentWords = cfg.subsequent_words;
      selectedVoice      = cfg.current || cfg.voice;

      // Render voice grid
      renderVoiceGrid(voices.voices, voices.current);
    } catch(e) { console.warn('Config load error:', e); }
  }

  function closeConfig() {
    document.getElementById('cfgOverlay').classList.remove('open');
    document.getElementById('cfgPanel').classList.remove('open');
  }

  function renderVoiceGrid(voices, current) {
    selectedVoice = current;
    const grid = document.getElementById('voiceGrid');
    grid.innerHTML = '';
    voices.forEach(v => {
      const parts   = v.split('-');
      const lang    = parts[0];                      // e.g. en_US
      const speaker = parts.slice(1, -1).join(' ');  // e.g. lessac
      const quality = parts[parts.length - 1];       // e.g. medium

      const btn = document.createElement('button');
      btn.className = 'voice-btn' + (v === current ? ' selected' : '');
      btn.dataset.voice = v;
      btn.innerHTML = `${speaker.toUpperCase()}<span class="voice-tag">${lang} · ${quality}</span>`;
      btn.onclick = () => {
        document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedVoice = v;
      };
      grid.appendChild(btn);
    });
  }

  async function applyConfig() {
    const payload = {
      voice:            selectedVoice,
      length_scale:     parseFloat(document.getElementById('lsSlider').value),
      initial_words:    parseInt(document.getElementById('iwSlider').value),
      subsequent_words: parseInt(document.getElementById('swSlider').value),
    };

    try {
      const r = await fetch('/tts/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const updated = await r.json();
      cfgInitialWords    = updated.initial_words;
      cfgSubsequentWords = updated.subsequent_words;

      const fb = document.getElementById('cfgFeedback');
      fb.textContent = '// CONFIG APPLIED';
      fb.style.opacity = '1';
      setTimeout(() => { fb.style.opacity = '0'; fb.textContent = ''; }, 2500);
    } catch(e) {
      document.getElementById('cfgFeedback').textContent = 'ERROR: ' + e.message;
    }
  }
</script>
</body>
